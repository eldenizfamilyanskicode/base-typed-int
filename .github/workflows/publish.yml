name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Annotated release tag to publish
        required: true
        type: string

concurrency:
  group: pypi-publish
  cancel-in-progress: false

jobs:
  publish:
    name: PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/base-typed-int/
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install Python
        run: uv python install 3.13

      - name: Verify release version
        shell: bash
        run: |
          package_version="$(uv version --short)"
          if [[ "v${package_version}" != "${RELEASE_TAG}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match package version ${package_version}."
            exit 1
          fi

      - name: Build distributions
        run: uv build

      - name: Smoke test wheel
        run: >-
          uv run --isolated --no-project --with dist/*.whl python -c
          "from base_typed_int import BaseTypedInt;
          value = BaseTypedInt(1);
          assert type(value) is BaseTypedInt"

      - name: Smoke test source distribution
        run: >-
          uv run --isolated --no-project --with dist/*.tar.gz python -c
          "from base_typed_int import BaseTypedInt;
          value = BaseTypedInt(1);
          assert type(value) is BaseTypedInt"

      - name: Publish distributions
        run: uv publish --trusted-publishing always dist/*
